Screens:
  AccountingScreen:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
    Children:
      - rectHeader_AC:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(83, 74, 183, 1)
            Height: =60
            Width: =Parent.Width
      - lblScreenTitle_AC:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Bold
            Height: =60
            Size: =18
            Text: ="Max Biocare Procurement - Accounting Handover"
            Width: =698
            X: =20
      - btnBack_AC:
          Control: Button@0.0.45
          Properties:
            Height: =36
            OnSelect: =Navigate(RequestDetailScreen)
            Text: ="← Back"
            Width: =100
            X: =Parent.Width - 120
            Y: =12
      - rowInfoBlock_AC:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(245, 245, 250, 1)
            Height: =160
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =4
            PaddingBottom: =12
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =12
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =60
          Children:
            - rowInfoLine1_AC:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Height: =36
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =16
                  LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                  LayoutMinHeight: =24
                  PaddingRight: =1
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width - 40
                Children:
                  - lblInfoTitle_AC:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Bold
                        Height: =24
                        PaddingLeft: =0
                        Size: =14
                        Text: =gSelectedRequest.Title
                        Width: =600
                  - lblStatusBadge_AC:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        BorderColor: =RGBA(133, 79, 11, 1)
                        BorderThickness: =1
                        Color: =RGBA(133, 79, 11, 1)
                        Fill: =RGBA(250, 238, 218, 1)
                        FontWeight: =FontWeight.Semibold
                        Height: =32
                        PaddingLeft: =8
                        PaddingRight: =10
                        Size: =10
                        Text: =gSelectedRequest.Status.Value
                        Width: =220
            - rowInfoLine2_AC:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =24
                  LayoutMinHeight: =24
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width - 40
                Children:
                  - lblInfoRequester_AC:
                      Control: Label@2.5.1
                      Properties:
                        Height: =20
                        PaddingLeft: =0
                        PaddingRight: =0
                        Size: =11
                        Text: |-
                          ="Requester: " & gSelectedRequest.RequesterID.Value
                        Width: =300
                  - lblInfoDept_AC:
                      Control: Label@2.5.1
                      Properties:
                        FillPortions: =1
                        Height: =20
                        LayoutMinWidth: =300
                        PaddingLeft: =0
                        Size: =11
                        Text: |-
                          ="Dept: " & gSelectedRequest.Department
                        Width: =600
            - rowInfoLine3_AC:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =24
                  LayoutMinHeight: =24
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width - 40
                  X: =40
                  Y: =40
                Children:
                  - lblInfoCategory_AC:
                      Control: Label@2.5.1
                      Properties:
                        Height: =20
                        PaddingLeft: =0
                        Size: =11
                        Text: |-
                          ="Category: " & gSelectedRequest.Category.Value
                        Width: =300
                  - lblInfoCost_AC:
                      Control: Label@2.5.1
                      Properties:
                        Height: =20
                        PaddingLeft: =0
                        Size: =11
                        Text: |-
                          ="Estimated Cost: " & gSelectedRequest.Currency.Value & " " & Text(gSelectedRequest.EstimatedCost, "#,###")
                        Width: =300
                  - lblInfoTargetInvoice_AC:
                      Control: Label@2.5.1
                      Properties:
                        Height: =20
                        PaddingLeft: =0
                        Size: =11
                        Text: |-
                          ="Cost Center: " & gSelectedRequest.InvoiceRegion.Value
                        Width: =240
      - conScrollable_AC:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =Parent.Height - 280
            LayoutDirection: =LayoutDirection.Vertical
            LayoutOverflowY: =LayoutOverflow.Scroll
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =220
          Children:
            - rowOfficialInvoiceRef_AC:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(219, 234, 254, 1)
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  LayoutMinHeight: =200
                  PaddingBottom: =12
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =12
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - lblOfficialInvoiceRefTitle_AC:
                      Control: Label@2.5.1
                      Properties:
                        Height: =24
                        PaddingLeft: =0
                        PaddingRight: =0
                        Size: =11
                        Text: ="Official Invoice Reference"
                        Width: =Parent.Width - 40
                  - lblOfficialInvoiceRefValue_AC:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(37, 99, 235, 1)
                        FontWeight: =FontWeight.Semibold
                        Height: =50
                        PaddingLeft: =0
                        Size: =11
                        Text: =If(IsBlank(gSelectedRequest.OfficialInvoiceLink), "—", gSelectedRequest.OfficialInvoiceLink)
                        Underline: =true
                        Width: =Parent.Width - 40
                  - lblSupplierSummaryRefTitle_AC:
                      Control: Label@2.5.1
                      Properties:
                        Height: =24
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =4
                        Size: =11
                        Text: ="Supplier Selection / Negotiation Summary"
                        Width: =Parent.Width - 40
                  - lblSupplierSummaryRefValue_AC:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(37, 99, 235, 1)
                        FontWeight: =FontWeight.Semibold
                        Height: =60
                        Overflow: =Overflow.Scroll
                        PaddingLeft: =0
                        PaddingRight: =0
                        Size: =11
                        Text: |-
                          =With(
                              {wSummary: LookUp(Procurement_ExecutionLog, RequestIDText = Text(gSelectedRequest.ID) && StepNumber = 1).SupplierSummary},
                              If(IsBlank(wSummary), "—", wSummary)
                          )
                        VerticalAlign: =VerticalAlign.Top
                        Width: =Parent.Width - 40
            - rowChecklistHeader_AC:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutMinHeight: =70
                  PaddingBottom: =4
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - lblChecklistHeader_AC:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Bold
                        Height: =24
                        Size: =12
                        Text: ="Accounting Checklist *"
                        Width: =Parent.Width - 40
                  - lblChecklistNote_AC:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(133, 79, 11, 1)
                        Height: =20
                        Size: =10
                        Text: ="All items must be checked before submitting"
                        Width: =Parent.Width - 40
            - rowCheck1_AC:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =40
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingBottom: =4
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =4
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - chk1_AC:
                      Control: CheckBox@0.0.30
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        Label: =
                        Width: =32
                  - lblChk1_AC:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        Height: =24
                        PaddingLeft: =0
                        PaddingRight: =0
                        Size: =11
                        Text: ="Invoice amount matches approved procurement request"
                        Width: =Parent.Width - 60
            - rowCheck2_AC:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =40
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingBottom: =4
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =4
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - chk2_AC:
                      Control: CheckBox@0.0.30
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        Label: =
                        Width: =32
                  - lblChk2_AC:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        Height: =24
                        PaddingLeft: =0
                        PaddingRight: =0
                        Size: =11
                        Text: ="VAT and tax compliance verified"
                        Width: =Parent.Width - 60
            - rowCheck3_AC:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =40
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingBottom: =4
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =4
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - chk3_AC:
                      Control: CheckBox@0.0.30
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        Label: =
                        Width: =32
                  - lblChk3_AC:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        Height: =24
                        PaddingLeft: =0
                        PaddingRight: =0
                        Size: =11
                        Text: ="Payment terms and due date confirmed"
                        Width: =Parent.Width - 60
            - rowCheck4_AC:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =40
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingBottom: =4
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =4
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - chk4_AC:
                      Control: CheckBox@0.0.30
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        Label: =
                        Width: =32
                  - lblChk4_AC:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        Height: =24
                        PaddingLeft: =0
                        PaddingRight: =0
                        Size: =11
                        Text: ="Invoice recorded in accounting system"
                        Width: =Parent.Width - 60
            - rowCheck5_AC:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =40
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingBottom: =4
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =4
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - chk5_AC:
                      Control: CheckBox@0.0.30
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        Label: =
                        Width: =32
                  - lblChk5_AC:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        Height: =24
                        PaddingLeft: =0
                        PaddingRight: =0
                        Size: =11
                        Text: ="Supporting documents complete and filed"
                        Width: =Parent.Width - 60
            - rowNotes_AC:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  LayoutMinHeight: =140
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - lblNotesLabel_AC:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Bold
                        Height: =24
                        Size: =11
                        Text: ="Accounting Notes *"
                        Width: =Parent.Width - 40
                  - txtNotes_AC:
                      Control: TextInput@0.0.54
                      Properties:
                        Height: =80
                        Mode: ='TextInputCanvas.Mode'.Multiline
                        Placeholder: ="Enter accounting notes, payment details, or remarks..."
                        Width: =Parent.Width - 40
      - conActionBar_AC:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =60
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =12
            LayoutJustifyContent: =LayoutJustifyContent.End
            PaddingBottom: =8
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =8
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =Parent.Height - 60
          Children:
            - btnCancel_AC:
                Control: Button@0.0.45
                Properties:
                  Height: =44
                  OnSelect: =Navigate(RequestDetailScreen)
                  Text: ="Cancel"
                  Width: =120
            - btnSubmit_AC:
                Control: Button@0.0.45
                Properties:
                  Height: =44
                  OnSelect: |-
                    =If(
                        Not(chk1_AC.Checked && chk2_AC.Checked && chk3_AC.Checked &&
                            chk4_AC.Checked && chk5_AC.Checked),
                        Notify("Please complete all checklist items", NotificationType.Error),
                        If(
                            IsBlank(txtNotes_AC.Value),
                            Notify("Accounting Notes is required", NotificationType.Error),
                            With(
                                {wPatched: Patch(
                                    Procurement_Requests,
                                    gSelectedRequest,
                                    {
                                        Status: {Value: "Completed"},
                                        AccountingHandlerID: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                        AccountingCompletedAt: Now()
                                    }
                                )},
                                If(
                                    IsBlank(wPatched.ID),
                                    Notify("Failed to update status. Please try again.", NotificationType.Error),
                                    With(
                                        {wLog: Patch(
                                            Procurement_ExecutionLog,
                                            Defaults(Procurement_ExecutionLog),
                                            {
                                                Title: "Step 2 - Accounting Handover - " & gSelectedRequest.Title,
                                                RequestID: {Id: gSelectedRequest.ID, Value: gSelectedRequest.Title},
                                                RequestIDText: Text(gSelectedRequest.ID),
                                                StepNumber: 2,
                                                StepName: {Value: "Accounting Handover"},
                                                ExecutedBy: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                                ExecutedAt: Now(),
                                                Notes: txtNotes_AC.Value
                                            }
                                        )},
                                        If(
                                            IsBlank(wLog.ID),
                                            Notify("Failed to save execution log. Please try again.", NotificationType.Error),
                                            Notify("Accounting handover completed. Request is now pending Goods Receipt & Acceptance.", NotificationType.Success);
                                            Navigate(HomeScreen)
                                        )
                                    )
                                )
                            )
                        )
                    )
                  Text: ="Submit →"
                  Width: =120
