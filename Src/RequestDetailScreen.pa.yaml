                  - lblExecPODetail:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(56, 96, 178, 1)
                        Height: =22
                        Size: =10
                        Text: |-
                          =If(IsBlank(ThisItem.PurchaseOrderLink), "", "PO: " & ThisItem.PurchaseOrderLink)
                        Visible: =Not(IsBlank(ThisItem.PurchaseOrderLink))
                        Width: =807
                        X: =500
                        Y: =40
                  - lblExecNotesDetail:
                      Control: Label@2.5.1
                      Properties:
                        AutoHeight: =true
                        Color: =RGBA(136, 135, 128, 1)
                        Height: =43
                        Size: =10
                        Text: |-
                          =Switch(
                              ThisItem.StepNumber,
                              4, If(IsBlank(gSelectedRequest.FollowUpRemarks), "", gSelectedRequest.FollowUpRemarks),
                              5, If(IsBlank(gSelectedRequest.SupplierFollowUpNotes), "", gSelectedRequest.SupplierFollowUpNotes),
                              If(IsBlank(ThisItem.Notes), "", ThisItem.Notes)
                          )
                        Visible: =Not(IsBlank(ThisItem.Notes))
                        Width: =Parent.Width - 40
                        X: =20
                        Y: =77
      - conActionBar:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =60
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =12
            LayoutJustifyContent: =LayoutJustifyContent.End
            PaddingBottom: =8
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =8
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Visible: |-
              =Not(
                  gSelectedRequest.Status.Value = "Completed" ||
                  gSelectedRequest.Status.Value = "Rejected"
              )
            Width: =Parent.Width
            Y: =Parent.Height - 60
          Children:
            - btnActionReview:
                Control: Button@0.0.45
                Properties:
                  Height: =44
                  OnSelect: =Navigate(If(gSelectedRequest.Status.Value = "Pending Manager", ManagerReviewScreen, ExecutiveApprovalScreen))
                  Text: ="Review Request →"
                  Visible: |-
                    =(gSelectedRequest.Status.Value = "Pending Manager" && (gCurrentUser.Role.Value = "Manager" || gCurrentUser.Role.Value = "Admin")) ||
                     (gSelectedRequest.Status.Value = "Pending Executive" && (gCurrentUser.Role.Value = "Executive" || gCurrentUser.Role.Value = "Admin"))
                  Width: =200
            - btnActionStart:
                Control: Button@0.0.45
                Properties:
                  Height: =44
                  OnSelect: =Navigate(ProcurementExecutionScreen)
                  Text: ="Start Procurement →"
                  Visible: =gSelectedRequest.Status.Value = "Pending Procurement" && (gCurrentUser.Role.Value = "Procurement" || gCurrentUser.Role.Value = "Admin")
                  Width: =220
            - btnActionAccounting:
                Control: Button@0.0.45
                Properties:
                  Height: =44
                  OnSelect: =Navigate(AccountingScreen)
                  Text: ="Start Accounting →"
                  Visible: =gSelectedRequest.Status.Value = "Pending Accounting" && (gCurrentUser.Role.Value = "Accounting" || gCurrentUser.Role.Value = "Executive" || gCurrentUser.Role.Value = "Admin")
                  Width: =220
            - btnActionGoodsReceipt:
                Control: Button@0.0.45
                Properties:
                  Height: =44
                  OnSelect: =Navigate(GoodsReceiptScreen)
                  Text: ="Goods Receipt & Acceptance →"
                  Visible: |-
                    =gSelectedRequest.Status.Value = "Goods Receipt & Acceptance" &&
                    gSelectedRequest.RequesterEmail = gCurrentEmployee.Email
                  Width: =260
            - btnActionSupplierFollowUpScreen:
                Control: Button@0.0.45
                Properties:
                  Height: =44
                  OnSelect: =Navigate(SupplierFollowUpScreen)
                  Text: ="Start Supplier Follow-up →"
                  Visible: =gSelectedRequest.Status.Value = "Pending Supplier Follow-up" && (gSelectedRequest.RequesterEmail = gCurrentEmployee.Email || gCurrentUser.Role.Value = "Procurement")
                  Width: =260
