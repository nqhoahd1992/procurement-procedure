                            Variant: AutoLayout
                            Properties:
                              DropShadow: =DropShadow.None
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =4
                              LayoutMinHeight: =70
                              LayoutMinWidth: =60
                              RadiusBottomLeft: =0
                              RadiusBottomRight: =0
                              RadiusTopLeft: =0
                              RadiusTopRight: =0
                              Width: =280
                            Children:
                              - lblABNLabel_ISS:
                                  Control: Label@2.5.1
                                  Properties:
                                    Color: =RGBA(136, 135, 128, 1)
                                    Height: =20
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    Size: =9
                                    Text: ="ABN"
                                    Width: =Parent.Width
                              - txtABNValue_ISS:
                                  Control: TextInput@0.0.54
                                  Properties:
                                    Height: =40
