                              Color: =RGBA(37, 99, 235, 1)
                              FontWeight: =FontWeight.Bold
                              Height: =20
                              PaddingLeft: =0
                              PaddingRight: =0
                              Size: =9
                              Text: |-
                                =If(gHasInvoiceResult,
                                    If(IsBlank(txtInvDateValue_ISS.Value), "", Substitute(txtInvDateValue_ISS.Value, "-", "")) &
                                    If(IsBlank(txtSupplierNameValue_ISS.Value), "", " - " & txtSupplierNameValue_ISS.Value) &
                                    If(IsBlank(txtBilledToValue_ISS.Value), "", " - " & txtBilledToValue_ISS.Value) &
                                    If(IsBlank(txtInvNumValue_ISS.Value), "", " - " & txtInvNumValue_ISS.Value) &
                                    If(IsBlank(txtAttentionValue_ISS.Value), "", " - " & txtAttentionValue_ISS.Value) &
                                    If(IsBlank(txtDescriptionValue_ISS.Value), "", " - " & txtDescriptionValue_ISS.Value) &
                                    If(IsBlank(txtTotalAmountValue_ISS.Value), "", " - " & txtCurrencyValue_ISS.Value & Text(Value(txtTotalAmountValue_ISS.Value), "[$-en-US]#,##0.00")) &
                                    If(IsBlank(txtTaxAmountValue_ISS.Value), "", " - GST " & txtCurrencyValue_ISS.Value & Text(Value(txtTaxAmountValue_ISS.Value), "[$-en-US]#,##0.00")) &
                                    "." & Last(Split(gInvoiceResult.suggestedFilename, ".")).Value,
                                    "—"
                                )
                              Width: =Parent.Width - 24
      - conActionBar_ISS:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =60
            LayoutAlignItems: =LayoutAlignItems.Center
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =12
            LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
            PaddingBottom: =8
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =8
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =Parent.Height - 60
          Children:
            - btnBack_ISS:
                Control: Button@0.0.45
                Properties:
                  Height: =36
                  OnSelect: =Navigate(HomeScreen)
                  Text: ="← Back"
                  Width: =100
            - btnSubmit_ISS:
                Control: Button@0.0.45
                Properties:
                  BasePaletteColor: =RGBA(83, 74, 183, 1)
                  DisplayMode: =If(gSelectedRequest.InvoiceMode.Value = "ViaRequester" && IsBlank(gSelectedRequest.RequesterInvoiceURL), DisplayMode.Disabled, DisplayMode.Edit)
                  Height: =36
                  OnSelect: |-
                    =Set(locInvoiceURL_ISS,
                        If(
                            gSelectedRequest.InvoiceMode.Value = "ViaRequester",
                            gSelectedRequest.RequesterInvoiceURL,
                            txtOfficialInvoiceISS.Value
                        )
                    );
                    If(
                        IsBlank(locInvoiceURL_ISS),
                        Notify("Please provide an invoice URL.", NotificationType.Error),
                        If(
                            Not(IsNumeric(Find("maxbiocare.sharepoint", locInvoiceURL_ISS))),
                            Notify("Please provide a valid SharePoint link (maxbiocare).", NotificationType.Error),
                            If(
                                !gHasInvoiceResult,
                                Notify("Please click 'Extract Invoice' to extract invoice data before submitting.", NotificationType.Warning),
                                If(
                                    IsBlank(txtInvDateValue_ISS.Value) ||
                                    IsBlank(txtSupplierNameValue_ISS.Value) ||
                                    IsBlank(txtBilledToValue_ISS.Value) ||
                                    IsBlank(txtInvNumValue_ISS.Value) ||
                                    IsBlank(txtTotalAmountValue_ISS.Value) ||
                                    IsBlank(txtCurrencyValue_ISS.Value) ||
                                    IsBlank(txtDescriptionValue_ISS.Value),
                                    Notify("Some invoice fields could not be extracted. Please fill them in manually before submitting.", NotificationType.Warning),
                            With(
                                {wPatched: Patch(
                                    Procurement_Requests,
                                    gSelectedRequest,
                                    {
                                        InvoiceSubmitted: true,
                                        Status: {Value: If(locSFUStep2Pending, "Pending Supplier Follow-up", "Pending Accounting")},
                                        OfficialInvoiceLink: locInvoiceURL_ISS
                                    }
                                )},
                                If(
                                    IsBlank(wPatched.ID),
                                    Notify("Failed to save. Please try again.", NotificationType.Error),
                                    With(
                                        {wLog: Patch(
                                            Procurement_ExecutionLog,
                                            Defaults(Procurement_ExecutionLog),
                                            {
                                                Title: "Step 6 - Invoice Submission - " & gSelectedRequest.Title,
                                                RequestID: {Id: gSelectedRequest.ID, Value: gSelectedRequest.Title},
                                                RequestIDText: Text(gSelectedRequest.ID),
                                                StepNumber: 6,
                                                StepName: {Value: "Invoice Submission"},
                                                ExecutedBy: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                                ExecutedAt: Now()
                                            }
                                        )},
                                        If(
                                            IsBlank(wLog.ID),
                                            Notify("Saved but log write failed. Please contact IT with reference: " & gSelectedRequest.Title, NotificationType.Warning);
                                            Navigate(HomeScreen),
                                            Set(gSubmitInvoiceResult,
                                                Submit_Invoice.Run(
                                                    locInvoiceURL_ISS,
                                                    gSelectedRequest.ID,
                                                    Left(lblSuggestedFilename_ISS.Text, Len(lblSuggestedFilename_ISS.Text) - Len("." & Last(Split(lblSuggestedFilename_ISS.Text, ".")).Value)),
                                                    txtInvDateValue_ISS.Value,
                                                    txtSupplierNameValue_ISS.Value,
                                                    txtBilledToValue_ISS.Value,
                                                    txtInvNumValue_ISS.Value,
                                                    Value(txtTotalAmountValue_ISS.Value),
                                                    Value(If(IsBlank(txtTaxAmountValue_ISS.Value), "0", txtTaxAmountValue_ISS.Value)),
                                                    txtCurrencyValue_ISS.Value,
                                                    gInvoiceResult.jobId,
                                                    gInvoiceResult.confidenceScore,
                                                    txtAttentionValue_ISS.Value,
                                                    txtDescriptionValue_ISS.Value,
                                                    gSelectedRequest.InvoiceRegion.Value,
                                                    txtABNValue_ISS.Value
                                                )
                                            );
                                            If(
                                                IsError(gSubmitInvoiceResult),
                                                Notify("Saved but invoice processing failed. Please contact IT with reference: " & gSelectedRequest.Title, NotificationType.Warning);
                                                Navigate(HomeScreen),
                                                Notify("Invoice submitted successfully. Request is now " & If(locSFUStep2Pending, "Pending Supplier Follow-up.", "Pending Accounting."), NotificationType.Success);
                                                Navigate(HomeScreen)
                                            )
                                        )
                                    )
                                )
                            )
                        )
                    )
                    )
                    )
                  Text: ="Submit Invoice →"
                  Width: =180
