Screens:
  InvoiceSubmissionScreen:
    Properties:
      LoadingSpinnerColor: =RGBA(56, 96, 178, 1)
      OnVisible: |-
        =Set(locSFUStep2Pending,
            Not(IsBlank(LookUp(Procurement_ExecutionLog, RequestIDText = Text(gSelectedRequest.ID) && StepNumber = 4))) &&
            IsBlank(LookUp(Procurement_ExecutionLog, RequestIDText = Text(gSelectedRequest.ID) && StepNumber = 5))
        );
        Set(gHasInvoiceResult, false);
        Set(gInvoiceResult, Blank());
        Set(gParsingInvoice, false);
        Set(gSelectedRequest, LookUp(Procurement_Requests, ID = gSelectedRequest.ID))
    Children:
      - rectHeader_ISS:
          Control: Rectangle@2.3.0
          Properties:
            Fill: =RGBA(83, 74, 183, 1)
            Height: =60
            Width: =Parent.Width
      - lblScreenTitle_ISS:
          Control: Label@2.5.1
          Properties:
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Bold
            Height: =60
            Size: =14
            Text: ="Max Biocare Procurement - Invoice Submission"
            Width: =654
            X: =20
      - lblUserInfo_ISS:
          Control: Label@2.5.1
          Properties:
            Align: =Align.Right
            Color: =RGBA(255, 255, 255, 1)
            FontWeight: =FontWeight.Semibold
            Height: =60
            Size: =12
            Text: |-
              =If(
                  IsBlank(gCurrentUser.Role.Value),
                  gCurrentEmployee.Title,
                  gCurrentEmployee.Title & " | " & gCurrentUser.Role.Value
              )
            Width: =280
            X: =Parent.Width - 300
      - rowInfoBlock_ISS:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(245, 245, 250, 1)
            Height: =100
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =4
            PaddingBottom: =12
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =12
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =60
          Children:
            - rowInfoLine1_ISS:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Height: =60
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =16
                  LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                  LayoutMinHeight: =24
                  PaddingRight: =1
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width - 40
                Children:
                  - lblInfoTitle_ISS:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Bold
                        Height: =24
                        PaddingLeft: =0
                        PaddingRight: =0
                        Size: =14
                        Text: =gSelectedRequest.Title
                        Width: =600
                  - lblStatusBadge_ISS:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        BorderColor: =RGBA(133, 79, 11, 1)
                        BorderThickness: =1
                        Color: =RGBA(133, 79, 11, 1)
                        Fill: =RGBA(250, 238, 218, 1)
                        FontWeight: =FontWeight.Semibold
                        Height: =32
                        PaddingLeft: =8
                        PaddingRight: =8
                        Size: =10
                        Text: =gSelectedRequest.Status.Value
                        Width: =220
            - rowInfoLine2_ISS:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =24
                  LayoutMinHeight: =24
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width - 40
                Children:
                  - lblInfoRequester_ISS:
                      Control: Label@2.5.1
                      Properties:
                        Height: =20
                        PaddingLeft: =0
                        PaddingRight: =0
                        Size: =11
                        Text: |-
                          ="Requester: " & gSelectedRequest.RequesterID.Value
                        Width: =240
                  - lblInfoCategory_ISS:
                      Control: Label@2.5.1
                      Properties:
                        Height: =20
                        Size: =11
                        Text: |-
                          ="Category: " & gSelectedRequest.Category.Value
                        Width: =240
                  - lblInfoInvoiceMode_ISS:
                      Control: Label@2.5.1
                      Properties:
                        Height: =20
                        Size: =11
                        Text: |-
                          ="Invoice Path: " & gSelectedRequest.InvoiceMode.Value
                        Width: =240
      - conScrollable_ISS:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =Parent.Height - 220
            LayoutDirection: =LayoutDirection.Vertical
            LayoutOverflowY: =LayoutOverflow.Scroll
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =160
          Children:
            - rowWaitingForRequester_ISS:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(250, 238, 218, 1)
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =8
                  PaddingBottom: =16
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =gSelectedRequest.InvoiceMode.Value = "ViaRequester" && IsBlank(gSelectedRequest.RequesterInvoiceURL)
                  Width: =Parent.Width
                Children:
                  - lblWaitingMsg_ISS:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(133, 79, 11, 1)
                        FontWeight: =FontWeight.Semibold
                        Height: =24
                        Size: =12
                        Text: ="Waiting for Requester to submit the corrected supplier invoice."
                        Width: =Parent.Width - 40
                  - lblWaitingHint_ISS:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(133, 79, 11, 1)
                        Height: =20
                        Size: =10
                        Text: ="Invoice processing is locked until the Requester provides the corrected file."
                        Width: =Parent.Width - 40
                  - btnRemindRequester_ISS:
                      Control: Button@0.0.45
                      Properties:
                        BasePaletteColor: =RGBA(133, 79, 11, 1)
                        Height: =36
                        OnSelect: |-
                          =Procurement_Notify_Remind_Invoice.Run(
                              gSelectedRequest.RequesterEmail,
                              gSelectedRequest.RequesterID.Value,
                              gSelectedRequest.Title,
                              gSelectedRequest.ID
                          );
                          Notify("Reminder sent to " & gSelectedRequest.RequesterID.Value & ".", NotificationType.Success)
                        Text: ="Remind Requester"
                        Width: =180
            - rowRequesterInvoicePreview_ISS:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(219, 234, 254, 1)
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  PaddingBottom: =12
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =12
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =gSelectedRequest.InvoiceMode.Value = "ViaRequester" && Not(IsBlank(gSelectedRequest.RequesterInvoiceURL))
                  Width: =Parent.Width
                Children:
                  - lblRequesterInvoiceLabel_ISS:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(37, 99, 235, 1)
                        FontWeight: =FontWeight.Bold
                        Height: =20
                        Size: =11
                        Text: ="Invoice submitted by Requester:"
                        Width: =Parent.Width - 40
                  - lblRequesterInvoiceURL_ISS:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(37, 99, 235, 1)
                        FontWeight: =FontWeight.Semibold
                        Height: =24
                        OnSelect: =If(Not(IsBlank(gSelectedRequest.RequesterInvoiceURL)), Launch(gSelectedRequest.RequesterInvoiceURL, {}, LaunchTarget.New))
                        Size: =11
                        Text: =If(IsBlank(gSelectedRequest.RequesterInvoiceURL), "—", gSelectedRequest.RequesterInvoiceURL)
                        Underline: =Not(IsBlank(gSelectedRequest.RequesterInvoiceURL))
                        Width: =Parent.Width - 40
            - rowOfficialInvoiceInput_ISS:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  LayoutMinHeight: =110
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Visible: =gSelectedRequest.InvoiceMode.Value = "Deferred"
                  Width: =Parent.Width
                Children:
                  - lblOfficialInvoiceInputLabel_ISS:
                      Control: HtmlViewer@2.1.0
                      Properties:
                        Font: =Font.'Open Sans'
                        Height: =36
                        HtmlText: ="<span style='font-weight:bold;font-size:13px;'>Official Invoice SharePoint Link (<a href='https://maxbiocare.sharepoint.com/sites/Powerapps/Invoice/Forms/AllItems.aspx' target='_blank'>Click here to access the SharePoint library</a>) *</span>"
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        Width: =Parent.Width - 40
                  - txtOfficialInvoiceISS:
                      Control: TextInput@0.0.54
                      Properties:
                        Height: =40
                        Placeholder: ="Paste the SharePoint link to the official invoice from the Invoice Library"
                        Width: =Parent.Width - 40
            - rowParseInvoice_ISS:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  AlignInContainer: =AlignInContainer.Start
                  DropShadow: =DropShadow.None
                  Fill: =RGBA(241, 239, 232, 1)
                  Height: =120
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =8
                  LayoutMinHeight: =360
                  PaddingBottom: =16
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - rowParseHeader_ISS:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Start
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =36
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                        LayoutMinHeight: =60
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =Parent.Width - 50
                      Children:
                        - lblParseInvoiceHeader_ISS:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Height: =28
                              PaddingLeft: =0
                              PaddingRight: =0
                              Size: =12
                              Text: =If(gParsingInvoice, "⏳ Parsing invoice, please wait...", "Invoice Data")
                              Width: =300
                        - btnParseInvoice_ISS:
                            Control: Button@0.0.45
                            Properties:
                              DisplayMode: =If(gSelectedRequest.InvoiceMode.Value = "ViaRequester" && IsBlank(gSelectedRequest.RequesterInvoiceURL), DisplayMode.Disabled, DisplayMode.Edit)
                              Height: =36
                              OnSelect: |-
                                =If(
                                    IsBlank(
                                        If(
                                            gSelectedRequest.InvoiceMode.Value = "ViaRequester",
                                            gSelectedRequest.RequesterInvoiceURL,
                                            txtOfficialInvoiceISS.Value
                                        )
                                    ),
                                    Notify("Please provide an invoice link before parsing.", NotificationType.Error),
                                    Set(gParsingInvoice, true);
                                    Set(gHasInvoiceResult, false);
                                    Set(gInvoiceResult,
                                        IfError(
                                            Parse_Invoice.Run(
                                                If(
                                                    gSelectedRequest.InvoiceMode.Value = "ViaRequester",
                                                    gSelectedRequest.RequesterInvoiceURL,
                                                    txtOfficialInvoiceISS.Value
                                                ),
                                                gSelectedRequest.ID
                                            ),
                                            Blank()
                                        )
                                    );
                                    Set(gHasInvoiceResult, true);
                                    Set(gParsingInvoice, false)
                                )
                              Text: |-
                                ="🔍 Extract Invoice"
                              Width: =160
                  - rowParseFields1_ISS:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        DropShadow: =DropShadow.None
                        FillPortions: =0
                        Height: =70
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =20
                        LayoutMinHeight: =70
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =Parent.Width - 50
                      Children:
                        - colInvoiceDate_ISS:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              DropShadow: =DropShadow.None
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =4
                              LayoutMinHeight: =70
                              LayoutMinWidth: =60
                              RadiusBottomLeft: =0
                              RadiusBottomRight: =0
                              RadiusTopLeft: =0
                              RadiusTopRight: =0
                              Width: =200
                            Children:
                              - lblInvDateLabel_ISS:
                                  Control: Label@2.5.1
                                  Properties:
                                    Color: =RGBA(136, 135, 128, 1)
                                    Height: =20
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    Size: =9
                                    Text: ="Invoice Date *"
                                    Width: =Parent.Width
                              - txtInvDateValue_ISS:
                                  Control: TextInput@0.0.54
                                  Properties:
                                    Height: =40
                                    Placeholder: ="YYYY-MM-DD"
                                    Value: =If(gHasInvoiceResult, gInvoiceResult.invoiceDate, "")
                                    Width: =Parent.Width
                        - colSupplierName_ISS:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              DropShadow: =DropShadow.None
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =4
                              LayoutMinHeight: =70
                              LayoutMinWidth: =60
                              RadiusBottomLeft: =0
                              RadiusBottomRight: =0
                              RadiusTopLeft: =0
                              RadiusTopRight: =0
                              Width: =280
                            Children:
                              - lblSupplierNameLabel_ISS:
                                  Control: Label@2.5.1
                                  Properties:
                                    Color: =RGBA(136, 135, 128, 1)
                                    Height: =20
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    Size: =9
