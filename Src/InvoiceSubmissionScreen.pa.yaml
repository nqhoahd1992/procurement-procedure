                            Variant: AutoLayout
                            Properties:
                              DropShadow: =DropShadow.None
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =4
                              LayoutMinHeight: =70
                              LayoutMinWidth: =60
                              RadiusBottomLeft: =0
                              RadiusBottomRight: =0
                              RadiusTopLeft: =0
                              RadiusTopRight: =0
                              Width: =160
                            Children:
                              - lblTotalAmountLabel_ISS:
                                  Control: Label@2.5.1
                                  Properties:
