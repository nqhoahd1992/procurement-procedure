                      Control: Gallery@2.15.0
                      Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
                      Properties:
                        FillPortions: =0
                        Height: =Max(CountRows(gSelectedRequest.Attachments) * 36 + 8, 36)
                        Items: =gSelectedRequest.Attachments
                        ShowScrollbar: =false
                        TemplateSize: =36
                        Width: =Parent.Width
                      Children:
                        - lblAttachmentName_1:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(56, 96, 178, 1)
                              Height: =36
                              OnSelect: =Launch(ThisItem.AbsoluteUri, {}, LaunchTarget.New)
                              Size: =11
                              Text: =If(IsBlank(ThisItem.DisplayName), "—", ThisItem.DisplayName)
                              Underline: =true
                              Width: =Parent.Width - 20
                              X: =1
