                Properties:
                  Height: =44
                  OnSelect: =Navigate(RequestDetailScreen)
                  Text: ="Cancel"
                  Width: =120
            - btnSubmit_PE:
                Control: Button@0.0.45
                Properties:
                  Height: =44
                  OnSelect: |-
                    =If(
                        rdoDecision_PE.Selected.Value = "Reject",
                        If(
                            IsBlank(txtRejectReason_PE.Value),
                            Notify("Please enter a rejection reason", NotificationType.Error),
                            With(
                                {wReq: Patch(
                                    Procurement_Requests,
                                    gSelectedRequest,
                                    {
                                        Status: {Value: "Rejected"},
                                        ProcurementExecutedBy: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                        ProcurementExecutedAt: Now()
                                    }
                                )},
                                If(
                                    IsBlank(wReq.ID),
                                    Notify("Failed to submit. Please try again.", NotificationType.Error),
                                    Patch(
                                        Procurement_ExecutionLog,
                                        Defaults(Procurement_ExecutionLog),
                                        {
                                            Title: "Step 1 - Procurement Rejected - " & gSelectedRequest.Title,
                                            RequestID: {Id: gSelectedRequest.ID, Value: gSelectedRequest.Title},
                                            RequestIDText: Text(gSelectedRequest.ID),
                                            StepNumber: 1,
                                            StepName: {Value: "Procurement Execution"},
                                            ExecutedBy: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                            ExecutedAt: Now(),
                                            Notes: txtRejectReason_PE.Value
                                        }
                                    );
                                    Notify("Request has been rejected.", NotificationType.Success);
                                    Navigate(HomeScreen)
                                )
                            )
                        ),
                        If(
                            Not(chk1_PE.Checked && chk2_PE.Checked && chk3_PE.Checked &&
                                chk4_PE.Checked && chk5_PE.Checked && chk6_PE.Checked),
                            Notify("Please complete all checklist items", NotificationType.Error),
                            If(
                                IsBlank(txtSupplierSummary_PE.Value) ||
                                IsBlank(ddAccountingHandler_PE.Selected),
                                Notify("Please fill in all required fields", NotificationType.Error),
                                If(
                                    IsBlank(
                                        If(
                                            gSelectedRequest.InvoiceType.Value = "Official Invoice",
                                            If(rdoInvoiceCorrect_PE.Selected.Value = "Yes",
                                                First(gSelectedRequest.Attachments).AbsoluteUri,
                                                txtNewInvoiceLink_PE.Value
                                            ),
                                            txtOfficialInvoiceDirect_PE.Value
                                        )
                                    ),
                                    Notify("Please provide an invoice link before submitting", NotificationType.Error),
                                    If(
                                        Not(IsNumeric(Find("maxbiocare.sharepoint",
                                            If(
                                                gSelectedRequest.InvoiceType.Value = "Official Invoice",
                                                If(rdoInvoiceCorrect_PE.Selected.Value = "Yes",
                                                    First(gSelectedRequest.Attachments).AbsoluteUri,
                                                    txtNewInvoiceLink_PE.Value
                                                ),
                                                txtOfficialInvoiceDirect_PE.Value
                                            )
                                        ))),
                                        Notify("Please provide a valid SharePoint link (maxbiocare)", NotificationType.Error),
                                        If(
                                            !gHasInvoiceResult,
                                            Notify("Please click 'Parse Invoice' to extract invoice data before submitting", NotificationType.Warning),
                                            If(
                                                IsBlank(txtInvNumValue_PE.Value) ||
                                                IsBlank(txtInvDateValue_PE.Value) ||
                                                IsBlank(txtSupplierNameValue_PE.Value) ||
                                                IsBlank(txtBilledToValue_PE.Value) ||
                                                IsBlank(txtTotalAmountValue_PE.Value) ||
                                                IsBlank(txtCurrencyValue_PE.Value) ||
                                                IsBlank(txtDescriptionValue_PE.Value),
                                                Notify("Some invoice fields could not be extracted. Please fill them in manually before submitting", NotificationType.Warning),
                                                With(
                                                    {
                                                        wOfficialInvoiceLink: If(
                                                            gSelectedRequest.InvoiceType.Value = "Official Invoice",
                                                            If(
                                                                rdoInvoiceCorrect_PE.Selected.Value = "Yes",
                                                                First(gSelectedRequest.Attachments).AbsoluteUri,
                                                                txtNewInvoiceLink_PE.Value
                                                            ),
                                                            txtOfficialInvoiceDirect_PE.Value
                                                        )
                                                    },
                                                    With(
                                                        {wReq: Patch(
                                                            Procurement_Requests,
                                                            gSelectedRequest,
                                                            {
                                                                Status: {Value: "Pending Accounting"},
                                                                OfficialInvoiceLink: wOfficialInvoiceLink,
                                                                AccountingHandlerID: {Id: ddAccountingHandler_PE.Selected.EmployeeID.Id, Value: ddAccountingHandler_PE.Selected.EmployeeID.Value},
                                                                ProcurementExecutedBy: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                                                ProcurementExecutedAt: Now()
                                                            }
                                                        )},
                                                        If(
                                                            IsBlank(wReq.ID),
                                                            Notify("Failed to submit. Please try again.", NotificationType.Error),
                                                            Patch(
                                                                Procurement_ExecutionLog,
                                                                Defaults(Procurement_ExecutionLog),
                                                                {
                                                                    Title: "Step 1 - Procurement Execution - " & gSelectedRequest.Title,
                                                                    RequestID: {Id: gSelectedRequest.ID, Value: gSelectedRequest.Title},
                                                                    RequestIDText: Text(gSelectedRequest.ID),
                                                                    StepNumber: 1,
                                                                    StepName: {Value: "Procurement Execution"},
                                                                    ExecutedBy: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.Title},
                                                                    ExecutedAt: Now(),
                                                                    HandoverToID: {Id: ddAccountingHandler_PE.Selected.EmployeeID.Id, Value: ddAccountingHandler_PE.Selected.EmployeeID.Value},
                                                                    HandoverToIDText: ddAccountingHandler_PE.Selected.EmployeeID.Value,
                                                                    SupplierSummary: txtSupplierSummary_PE.Value,
                                                                    PurchaseOrderLink: txtPurchaseOrder_PE.Value
                                                                }
                                                            );
                                                            Set(gSubmitInvoiceResult,
                                                                Submit_Invoice.Run(
                                                                    wOfficialInvoiceLink,
                                                                    gSelectedRequest.ID,
                                                                    Left(lblSuggestedFilename_PE.Text, Len(lblSuggestedFilename_PE.Text) - Len("." & Last(Split(lblSuggestedFilename_PE.Text, ".")).Value)),
                                                                    txtInvDateValue_PE.Value,
                                                                    txtSupplierNameValue_PE.Value,
                                                                    txtBilledToValue_PE.Value,
                                                                    txtInvNumValue_PE.Value,
                                                                    Value(txtTotalAmountValue_PE.Value),
                                                                    Value(If(IsBlank(txtTaxAmountValue_PE.Value), "0", txtTaxAmountValue_PE.Value)),
                                                                    txtCurrencyValue_PE.Value,
                                                                    gInvoiceResult.jobId,
                                                                    gInvoiceResult.confidenceScore,
                                                                    txtAttentionValue_PE.Value,
                                                                    txtDescriptionValue_PE.Value,
                                                                    gSelectedRequest.InvoiceRegion.Value,
                                                                    txtABNValue_PE.Value
                                                                )
                                                            );
                                                            If(
                                                                IsError(gSubmitInvoiceResult),
                                                                Notify("Submission saved but invoice processing failed. Please contact IT with reference: " & gSelectedRequest.Title, NotificationType.Warning);
                                                                Navigate(HomeScreen),
                                                                Notify("Procurement execution submitted successfully", NotificationType.Success);
                                                                Navigate(HomeScreen)
                                                            )
                                                        )
                                                    )
                                                )
                                            )
                                        )
                                    )
                                )
                            )
                        )
                    )
                  Text: ="Submit →"
                  Width: =120
