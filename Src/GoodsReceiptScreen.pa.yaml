                        Width: =Parent.Width - 60
            - rowCheckGR5:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =40
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingBottom: =4
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =4
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - chkGR5:
                      Control: CheckBox@0.0.30
                      Properties:
                        Label: ="Checkbox"
                        Width: =32
                  - lblChkGR5:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        Height: =24
                        PaddingLeft: =0
                        PaddingRight: =0
                        Size: =11
                        Text: ="Damaged or incorrect items reported to Procurement (if applicable)"
                        Width: =Parent.Width - 60
            - rowReceiptFields_GR:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =20
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - colReceivedBy_GR:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =4
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =300
                      Children:
                        - lblReceivedByLabel_GR:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Height: =24
                              Size: =11
                              Text: ="Received By *"
                              Width: =300
                        - ddReceivedBy_GR:
                            Control: ComboBox@0.0.51
                            Properties:
                              Height: =40
                              InputTextPlaceholder: ="Choose an option"
                              Items: =Sort('Employee List', 'Tiêu đề', SortOrder.Ascending)
                              Width: =Parent.Width
                            Children:
                              - Title_RB:
                                  Control: ComboBoxDataField@1.5.0
                                  Variant: textualColumn
                                  IsLocked: true
                                  Properties:
                                    FieldDisplayName: ="Title"
                                    FieldName: ="Title"
                                    FieldType: ="E"
                                    Order: =1
                  - colReceiptDate_GR:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =4
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =220
                      Children:
                        - lblReceiptDateLabel_GR:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Height: =24
                              Size: =11
                              Text: ="Receipt Date *"
                              Width: =220
                        - dpReceiptDate_GR:
                            Control: DatePicker@0.0.46
                            Properties:
                              Height: =40
                              Placeholder: ="Choose a date"
                              Width: =Parent.Width
            - rowReceiptFields_GR_1:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =20
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =16
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                  X: =40
                  Y: =40
                Children:
                  - rowReceiptStatus_GR:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =4
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =Parent.Width
                        X: =40
                        Y: =40
                      Children:
                        - lblReceiptStatusLabel_GR:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Height: =24
                              Size: =11
                              Text: ="Receipt Status *"
                              Width: =Parent.Width - 40
                        - ddReceiptStatus_GR:
                            Control: ComboBox@0.0.51
                            Properties:
                              Height: =40
                              InputTextPlaceholder: ="Choose an option"
                              Items: =Choices(Procurement_Requests.GoodsReceiptStatus)
                              Width: =Parent.Width
                  - rowAcceptanceDecision_GR:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =4
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =Parent.Width
                        X: =40
                        Y: =40
                      Children:
                        - lblAcceptanceDecisionLabel_GR:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Height: =24
                              Size: =11
                              Text: ="Acceptance Decision *"
                              Width: =Parent.Width - 40
                        - ddAcceptanceDecision_GR:
                            Control: ComboBox@0.0.51
                            Properties:
                              Height: =40
                              InputTextPlaceholder: ="Choose an option"
                              Items: =Choices(Procurement_Requests.GoodsAcceptanceDecision)
                              Width: =Parent.Width
            - rowRemarks_GR:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =4
                  LayoutMinHeight: =160
                  PaddingBottom: =8
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =8
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - lblRemarksLabel_GR:
                      Control: Label@2.5.1
                      Properties:
                        FontWeight: =FontWeight.Bold
                        Height: =24
                        Size: =11
                        Text: ="Remarks *"
                        Width: =Parent.Width - 40
                  - lblRemarksHint_GR:
                      Control: Label@2.5.1
                      Properties:
                        Color: =RGBA(136, 135, 128, 1)
                        Height: =20
                        Size: =10
                        Text: ="Describe receipt issues, missing or damaged items, or notes for Procurement team"
                        Width: =Parent.Width - 40
                  - txtRemarks_GR:
                      Control: TextInput@0.0.54
                      Properties:
                        Height: =80
                        Mode: ='TextInputCanvas.Mode'.Multiline
                        Placeholder: ="Enter remarks here..."
                        Width: =Parent.Width - 40
      - conActionBar_GR:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Fill: =RGBA(255, 255, 255, 1)
            Height: =60
            LayoutDirection: =LayoutDirection.Horizontal
            LayoutGap: =12
            LayoutJustifyContent: =LayoutJustifyContent.End
            PaddingBottom: =8
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =8
            RadiusBottomLeft: =0
            RadiusBottomRight: =0
            RadiusTopLeft: =0
            RadiusTopRight: =0
            Width: =Parent.Width
            Y: =Parent.Height - 60
          Children:
            - btnCancel_GR:
                Control: Button@0.0.45
                Properties:
                  Height: =44
                  OnSelect: =Navigate(RequestDetailScreen)
                  Text: ="Cancel"
                  Width: =120
            - btnSubmit_GR:
                Control: Button@0.0.45
                Properties:
                  Height: =44
                  OnSelect: |-
                    =If(
                        Not(chkGR1.Checked && chkGR2.Checked && chkGR3.Checked && chkGR4.Checked && chkGR5.Checked),
                        Notify("Please complete all checklist items", NotificationType.Error),
                        If(
                            IsBlank(ddReceivedBy_GR.Selected.'Tiêu đề') ||
                            IsBlank(dpReceiptDate_GR.SelectedDate) ||
                            IsBlank(ddReceiptStatus_GR.Selected) ||
                            IsBlank(ddAcceptanceDecision_GR.Selected) ||
                            IsBlank(txtRemarks_GR.Value),
                            Notify("Please fill in all required fields", NotificationType.Error),
                            With(
                                {
                                    wPatched: Patch(
                                        Procurement_Requests,
                                        gSelectedRequest,
                                        {
                                            Status: {Value: Switch(
                                                ddAcceptanceDecision_GR.Selected.Value,
                                                "Accepted",                    "Completed",
                                                "Rejected",                    "Rejected",
                                                "Requires Supplier Follow-up", "Pending Supplier Follow-up"
                                            )},
                                            GoodsReceiptBy: ddReceivedBy_GR.Selected.'Tiêu đề',
                                            GoodsReceiptDate: dpReceiptDate_GR.SelectedDate,
                                            GoodsReceiptStatus: {Value: ddReceiptStatus_GR.Selected.Value},
                                            GoodsAcceptanceDecision: {Value: ddAcceptanceDecision_GR.Selected.Value},
                                            GoodsReceiptRemarks: txtRemarks_GR.Value,
                                            GoodsReceiptAt: Now()
                                        }
                                    )
                                },
                                If(
                                    IsBlank(wPatched.ID),
                                    Notify("Failed to submit. Please try again.", NotificationType.Error),
                                    Patch(
                                        Procurement_ExecutionLog,
                                        Defaults(Procurement_ExecutionLog),
                                        {
                                            'Tiêu đề': "Step 3 - Goods Receipt - " & gSelectedRequest.'Tiêu đề',
                                            RequestID: {Id: gSelectedRequest.ID, Value: gSelectedRequest.'Tiêu đề'},
                                            RequestIDText: Text(gSelectedRequest.ID),
                                            StepNumber: 3,
                                            StepName: {Value: "Goods Receipt & Acceptance"},
                                            ExecutedBy: {Id: gCurrentEmployee.ID, Value: gCurrentEmployee.'Tiêu đề'},
                                            ExecutedAt: Now()
                                        }
                                    );
                                    Switch(
                                        ddAcceptanceDecision_GR.Selected.Value,
                                        "Accepted",                    Notify("Goods receipt submitted. Request is now Completed.", NotificationType.Success),
                                        "Rejected",                    Notify("Goods receipt submitted. Request is now Rejected.", NotificationType.Success),
                                        "Requires Supplier Follow-up", Notify("Goods receipt submitted. Request is pending Supplier Follow-up.", NotificationType.Success)
                                    );
                                    Navigate(HomeScreen)
                                )
                            )
                        )
                    )
                  Text: ="Submit →"
                  Width: =160
