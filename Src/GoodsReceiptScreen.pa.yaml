                        Size: =11
                        Text: ="Quantity and condition verified"
                        Width: =Parent.Width - 60
            - rowCheckGR4:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  FillPortions: =0
                  Height: =40
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingBottom: =4
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =4
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                  Width: =Parent.Width
                Children:
                  - chkGR4:
                      Control: CheckBox@0.0.30
